<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">

        <aside class="sidebar">
            <h2 class="logo">VibeTune-Music</h2>

            <nav>
                <a href="#" class="active">🏠 Home</a>
                <a href="#">🔍 Search</a>
                <a href="#">📚 Your Library</a>
            </nav>

            <div class="playlist-menu">
                <p>➕ Create Playlist</p>
                <p id="likedSongsLink">💚 Liked Songs</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <input type="text" id="searchInput" placeholder="Search songs..." />
            </header>

            <div class="hero">
                <p>Welcome Back</p>
                <h1>Listen to your favorite music</h1>
                <span>Best songs picked for you</span>
            </div>

            <section>
                <h1>Good Evening</h1>

                <div class="categories">
                    <button class="active-category" data-category="all">All</button>
                    <button data-category="90s">90s Hits</button>
                    <button data-category="new">New Songs</button>
                    <button data-category="arijit">Arijit Singh</button>
                    <button data-category="jubin">Jubin Nautiyal</button>
                </div>

                <div class="song-list" id="songList">
                    <!-- Songs JS se aayenge -->
                </div>
                <div class="recent-section">
                    <h2>Recently Played</h2>
                    <div class="recent-list" id="recentList"></div>
                </div>
            </section>
        </main>


    </div>

    <footer class="player">
        <div class="song-info">
            <img id="currentCover" src="cover1.webp" alt="cover" />
            <div>
                <h4 id="currentTitle">Song Title</h4>
                <p id="currentArtist">Artist Name</p>
            </div>
        </div>

        <div class="controls">
            <div>
                <button id="shuffleBtn">🔀</button>
                <button id="prevBtn">⏮</button>
                <button id="playBtn">▶</button>
                <button id="nextBtn">⏭</button>
                <button id="repeatBtn">🔁</button>
            </div>

            <div class="progress-area">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100" title="Audio progress"
                    aria-label="Audio progress" />
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="volume">
            <span>🔊</span>
            <input type="range" id="volumeBar" value="70" min="0" max="100" title="Volume" aria-label="Volume" />
        </div>
    </footer>

    <audio id="audio"></audio>

    <script src="script.js"></script>
</body>

</html>
